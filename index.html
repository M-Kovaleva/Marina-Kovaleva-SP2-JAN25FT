<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="BidNoroff - Student auction platform" />
  
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  
  <!-- Google Fonts: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <!-- Tailwind CSS -->
  <link rel="stylesheet" href="/src/css/tailwind.css" />
  
  <title>BidNoroff — Student Auction</title>
</head>
<body class="min-h-screen bg-surface font-sans text-text-primary">
  
  <div class="max-w-4xl mx-auto p-8">
    <h1 class="text-4xl font-bold text-primary-500 mb-4">
      🎉 BidNoroff
    </h1>
    <p class="text-lg text-text-secondary mb-6">
      Tailwind CSS with custom theme is working!
    </p>
    <button class="px-6 py-3 bg-primary-500 text-white font-semibold rounded-lg hover:bg-primary-600 transition-colors">
      Primary Button
    </button>
    <button class="ml-4 px-6 py-3 bg-success text-white font-semibold rounded-lg">
      Success
    </button>
    <button class="ml-4 px-6 py-3 bg-error text-white font-semibold rounded-lg">
      Error

  <script type="module" src="/src/js/main.js"></script>
