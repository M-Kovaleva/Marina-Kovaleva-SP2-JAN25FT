<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="BidNoroff - Student auction platform for Noroff students" />
  
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/src/css/tailwind.css" />
  
  <title>BidNoroff — Student Auction</title>
</head>
<body class="min-h-screen flex flex-col bg-surface font-sans text-text-primary">
  
  <!-- Navigation -->
  <nav class="sticky top-0 z-50 bg-white border-b border-border">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      
      <!-- Logo -->
      <a href="/" data-link class="text-xl font-bold text-primary-500 hover:text-primary-600 transition-colors">
        BidNoroff
      </a>
      <!-- Desktop Navigation (hidden on mobile, flex on md+) -->
      <div class="hidden md:flex items-center gap-6">
        <a href="/" data-link class="nav-link">Explore</a>
        <a href="/profile" data-link class="nav-link hidden" id="profile-link">Profile</a>
        <a href="/login" data-link class="nav-link" id="auth-link">Login</a>
        
        <!-- Credits Badge (shown when logged in) -->
        <div id="credits-badge" class="items-center badge-credits" style="display: none;">
          <span>💰</span>
          <span id="credits-amount"></span>
        </div>
        
        <a href="/listing/create" data-link class="btn-primary text-sm" id="new-listing-btn">+ New Listing</a>
      </div>

      <!-- Mobile Navigation Controls -->
      <div class="flex md:hidden items-center gap-2">
        <!-- Credits Badge Mobile (shown when logged in) -->
        <div id="credits-badge-mobile" class="hidden items-center badge-credits text-xs">
          <span>💰</span>
          <span id="credits-amount-mobile"></span>
        </div>
        
        <!-- New Listing Button (Mobile) -->
        <a href="/listing/create" data-link class="btn-primary text-sm px-3 py-2" id="new-listing-btn-mobile">
          + New
        </a>
        
        <!-- Hamburger / Close Menu Button -->
        <button id="mobile-menu-btn" class="btn-menu" aria-label="Toggle menu" aria-expanded="false">
          <!-- Hamburger Icon (visible when menu closed) -->
          <svg id="icon-hamburger" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <!-- Close Icon (hidden when menu closed) -->
          <svg id="icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="hidden md:hidden fixed inset-x-0 top-[57px] bottom-0 bg-white z-40">
      <div class="flex flex-col items-center gap-6 pt-12 px-4">
        <a href="/" data-link class="nav-link-mobile">Explore</a>
        <a href="/profile" data-link class="nav-link-mobile hidden" id="profile-link-mobile">Profile</a>
        <a href="/login" data-link id="auth-link-mobile" class="nav-link-mobile">Login</a>
      </div>
    </div>
  </nav>

  <!-- App Container -->
  <main id="app" class="flex-1">
    <!-- Router will inject views here -->
  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-border py-6">
    <div class="max-w-6xl mx-auto px-4 text-center text-text-secondary text-sm">
      <p>© 2026 BidNoroff</p>
    </div>
  </footer>

  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
